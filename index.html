<!DOCTYPE html>
<html>

<head>
  <title>My Playlist</title>
  <meta charset="UTF-8" />
  <link type="text/css" rel="stylesheet" href="css/style.css" />
</head>

<body>
  <h1>Nextech Playlist</h1>

  <div class="form">
    <input placeholder="Song Title" class="title" />
    <input placeholder="Artist Name" class="artist" />
    <input placeholder="Spotify Track Link" class="link" />
    <button class="add-input">Add Song</button>
  </div>

  <div class="instructions">
    <p><strong>How to add a song:</strong></p>
    <ol>
      <li>Open Spotify and find the song you want to add.</li>
      <li>Right-click the song (or tap the "..." menu) and choose <strong>Share -> Copy Song Link</strong>.</li>
      <li>Paste the song title, artist name, and link into the boxes above.</li>
      <li>Click <strong>Add Song</strong> to add it to the playlist.</li>
    </ol>
  </div>

  <div class="display"></div>

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <!-- Your Javascript -->
  <script src="js/script.js"></script>
</body>

</html>
